<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AC Switch</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="AC Switch">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="apple-touch-icon" href="img/switch.png">
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f1a;
      --card:     #1a1a2e;
      --accent:   #6c63ff;
      --accent2:  #ff6584;
      --text:     #ffffff;
      --muted:    #888;
      --green:    #4ade80;
      --red:      #f87171;
      --nav-h:    70px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Status bar ── */
    .status-bar {
      padding: 14px 20px 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--red);
      transition: background 0.4s;
    }
    .dot.on { background: var(--green); }

    /* ── Pages ── */
    .pages { flex: 1; position: relative; overflow: hidden; }

    .page {
      position: absolute; inset: 0;
      padding: 24px 24px 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      overflow-y: auto;
    }
    .page.active { display: flex; }

    .page-title {
      font-size: 22px;
      font-weight: 700;
      align-self: flex-start;
      padding-bottom: 20px;
    }

    /* ── Timer display ── */
    .timer-display {
      font-size: 70px;
      font-weight: 200;
      letter-spacing: 6px;
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      transition: color 0.4s;
    }
    .timer-display.running { color: var(--green); }

    /* ── Time inputs ── */
    .time-inputs {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .time-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .time-unit label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .time-unit input {
      width: 76px;
      background: var(--card);
      border: 1.5px solid #2a2a40;
      border-radius: 14px;
      color: var(--text);
      font-size: 28px;
      font-weight: 300;
      text-align: center;
      padding: 12px 0;
      outline: none;
      -moz-appearance: textfield;
    }
    .time-unit input::-webkit-outer-spin-button,
    .time-unit input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .time-unit input:focus { border-color: var(--accent); }
    .time-sep {
      font-size: 32px;
      color: var(--muted);
      padding-bottom: 10px;
    }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      max-width: 320px;
      padding: 18px;
      border-radius: 16px;
      border: none;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
    }
    .btn:active { transform: scale(0.97); opacity: 0.9; }

    .btn-start  { background: var(--accent); color: #fff; }
    .btn-cancel { background: #22223a; color: var(--muted); }

    /* ── Switch button ── */
    .switch-wrap {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
    }
    .switch-btn {
      position: relative;
      padding: 0;
      border: none;
      background: none;
      border-radius: 115px;
      cursor: pointer;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.12s ease;
    }
    .switch-btn img {
      display: block;
      width: 220px;
      height: 230px;
      object-fit: contain;
      border-radius: 20px;
    }
    .switch-btn.pressed { transform: scale(0.94); }

    /* Ripple */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(0, 255, 231, 0.55);   /* aqua */
      transform: scale(0);
      pointer-events: none;
      animation: ripple-anim 1s ease-out forwards;
    }
    @keyframes ripple-anim {
      to { transform: scale(3.2); opacity: 0; }
    }
    .switch-glow {
      position: absolute;
      inset: -6px;
      border-radius: 24px;
      box-shadow: 0 0 0 0 rgba(0, 255, 231, 0);
      pointer-events: none;
    }
    .switch-glow.on { animation: glow-anim 1s ease-out forwards; }
    @keyframes glow-anim {
      0%   { box-shadow: 0 0 0 0 rgba(0, 255, 231, 0.6); }
      100% { box-shadow: 0 0 24px 10px rgba(0, 255, 231, 0); }
    }

    /* ── Small status text ── */
    .msg {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      min-height: 18px;
      transition: color 0.3s;
    }
    .msg.ok  { color: var(--green); }
    .msg.err { color: var(--red); }

    /* ── Bottom nav ── */
    .nav {
      height: var(--nav-h);
      background: var(--card);
      border-top: 1px solid #1e1e30;
      display: flex;
      flex-shrink: 0;
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      letter-spacing: 0.5px;
      transition: color 0.2s;
    }
    .nav-btn .ni { width: 26px; height: 26px; object-fit: contain; opacity: 0.5; transition: opacity 0.2s; }
    .nav-btn.active .ni { opacity: 1; }
    .nav-btn.active { color: var(--accent); }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: calc(var(--nav-h) + 16px);
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #2a2a40;
      color: #fff;
      padding: 12px 22px;
      border-radius: 24px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      white-space: nowrap;
      z-index: 99;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<!-- Status bar -->
<div class="status-bar">
  <div class="dot" id="dot"></div>
  <span id="statusText">Connecting to broker...</span>
</div>

<!-- Pages -->
<div class="pages">

  <!-- AUTO PAGE -->
  <div class="page active" id="page-auto">
    <p class="page-title">Auto Timer</p>

    <div class="timer-display" id="timerDisplay">00:00:00</div>

    <div class="time-inputs" id="timeInputs">
      <div class="time-unit">
        <label>Hours</label>
        <input type="number" id="inputH" min="0" max="23" value="2">
      </div>
      <div class="time-sep">:</div>
      <div class="time-unit">
        <label>Min</label>
        <input type="number" id="inputM" min="0" max="59" value="0">
      </div>
      <div class="time-sep">:</div>
      <div class="time-unit">
        <label>Sec</label>
        <input type="number" id="inputS" min="0" max="59" value="0">
      </div>
    </div>

    <button class="btn btn-start"  id="startBtn"  onclick="startTimer()">Start Timer</button>
    <button class="btn btn-cancel" id="cancelBtn" onclick="cancelTimer()" style="display:none">Cancel</button>

    <p class="msg" id="autoMsg"></p>
  </div>

  <!-- MANUAL PAGE -->
  <div class="page" id="page-manual">
    <p class="page-title">Manual Control</p>

    <div class="switch-wrap">
      <button class="switch-btn" id="switchBtn">
        <span class="switch-glow" id="switchGlow"></span>
        <img src="img/off.png" alt="Press to toggle AC">
      </button>
    </div>

    <p class="msg" id="manualMsg" style="margin-top: 48px;">Tap the switch to toggle AC</p>
  </div>

</div>

<!-- Bottom nav -->
<nav class="nav">
  <button class="nav-btn active" id="nav-auto" onclick="switchPage('auto')">
    <img class="ni" src="img/time.png" alt="Auto">
    <span>AUTO</span>
  </button>
  <button class="nav-btn" id="nav-manual" onclick="switchPage('manual')">
    <img class="ni" src="img/home.png" alt="Manual">
    <span>MANUAL</span>
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
  // ── MQTT config ───────────────────────────────────────────────
  const BROKER = 'wss://broker.hivemq.com:8884/mqtt';
  const TOPIC  = 'cityu/room/ac/press';    // commands out
  const STATUS = 'cityu/room/ac/status';   // state in (retained)

  // ── MQTT setup ────────────────────────────────────────────────
  let client;

  function connectMqtt() {
    const id = 'pwa-ac-' + Math.random().toString(16).slice(2, 8);
    client = mqtt.connect(BROKER, { clientId: id, clean: true, reconnectPeriod: 3000 });

    client.on('connect', () => {
      setStatus(true, 'Connected to broker');
      client.subscribe(STATUS);   // get the retained state immediately
    });
    client.on('offline', () => setStatus(false, 'Disconnected — retrying...'));
    client.on('error',   () => setStatus(false, 'Connection error — retrying...'));
    client.on('message', (topic, payload) => {
      if (topic === STATUS) handleStatus(payload.toString());
    });
  }

  function publish(msg) {
    if (!client?.connected) { toast('⚠️ Not connected to broker'); return false; }
    client.publish(TOPIC, msg);
    return true;
  }

  function setStatus(ok, text) {
    document.getElementById('dot').className = 'dot' + (ok ? ' on' : '');
    document.getElementById('statusText').textContent = text;
  }

  // ── Navigation ────────────────────────────────────────────────
  function switchPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    document.getElementById('nav-' + name).classList.add('active');
  }

  // ── Auto timer ────────────────────────────────────────────────
  // The ESP32 owns the countdown. The app just sends the schedule and
  // renders whatever state the ESP32 reports on the retained STATUS topic.
  let ticker = null;
  let remaining = 0;

  function startTimer() {
    const h = parseInt(document.getElementById('inputH').value) || 0;
    const m = parseInt(document.getElementById('inputM').value) || 0;
    const s = parseInt(document.getElementById('inputS').value) || 0;
    const secs = h * 3600 + m * 60 + s;

    if (secs <= 0) { toast('⚠️ Set a time greater than 0'); return; }

    if (!publish('off-in:' + secs)) return;
    setMsg('autoMsg', '⏳ Timer sent to device...');
    // UI will switch to running mode when the ESP32 echoes back a timer status.
  }

  function cancelTimer() {
    publish('cancel');
    setMsg('autoMsg', 'Cancelling...');
  }

  // Called whenever the ESP32 reports its state.
  //   "timer:<seconds>"  → countdown running on device
  //   "idle"             → no timer running
  function handleStatus(msg) {
    if (msg.startsWith('timer:')) {
      remaining = parseInt(msg.slice(6)) || 0;
      showRunning();
      refreshDisplay();
    } else {
      showIdle();
    }
  }

  function showRunning() {
    document.getElementById('timeInputs').style.display = 'none';
    document.getElementById('startBtn').style.display   = 'none';
    document.getElementById('cancelBtn').style.display  = 'block';
    document.getElementById('timerDisplay').classList.add('running');

    // Smooth local tick between the ESP32's ~5s status updates.
    if (!ticker) {
      ticker = setInterval(() => {
        if (remaining > 0) { remaining--; refreshDisplay(); }
      }, 1000);
    }
  }

  function showIdle() {
    if (ticker) { clearInterval(ticker); ticker = null; }
    document.getElementById('timeInputs').style.display = 'flex';
    document.getElementById('startBtn').style.display   = 'block';
    document.getElementById('cancelBtn').style.display  = 'none';
    document.getElementById('timerDisplay').textContent = '00:00:00';
    document.getElementById('timerDisplay').classList.remove('running');
  }

  function refreshDisplay() {
    const h = String(Math.floor(remaining / 3600)).padStart(2, '0');
    const m = String(Math.floor((remaining % 3600) / 60)).padStart(2, '0');
    const s = String(remaining % 60).padStart(2, '0');
    document.getElementById('timerDisplay').textContent = `${h}:${m}:${s}`;
  }

  // ── Manual press ─────────────────────────────────────────────
  // Tap the switch button → send one "press". A ripple + glow plays
  // for ~1s in aqua, and the button squishes while held.
  const switchBtn  = document.getElementById('switchBtn');
  const switchGlow = document.getElementById('switchGlow');

  function spawnRipple(x, y) {
    const rect = switchBtn.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    const r = document.createElement('span');
    r.className = 'ripple';
    r.style.width = r.style.height = size + 'px';
    r.style.left = (x - rect.left - size / 2) + 'px';
    r.style.top  = (y - rect.top  - size / 2) + 'px';
    switchBtn.appendChild(r);
    setTimeout(() => r.remove(), 1000);

    switchGlow.classList.remove('on');
    void switchGlow.offsetWidth;   // restart animation
    switchGlow.classList.add('on');
  }

  switchBtn.addEventListener('pointerdown', () => switchBtn.classList.add('pressed'));
  ['pointerup', 'pointerleave', 'pointercancel'].forEach(ev =>
    switchBtn.addEventListener(ev, () => switchBtn.classList.remove('pressed'))
  );

  switchBtn.addEventListener('click', e => {
    // Center the ripple on the tap point (fallback to button center).
    const rect = switchBtn.getBoundingClientRect();
    const x = e.clientX || rect.left + rect.width / 2;
    const y = e.clientY || rect.top + rect.height / 2;
    spawnRipple(x, y);

    if (publish('press')) {
      setMsg('manualMsg', '✅ Switch pressed', 'ok');
      toast('✅ Switch pressed');
    } else {
      setMsg('manualMsg', '❌ Not connected to broker', 'err');
    }
  });

  // ── Helpers ───────────────────────────────────────────────────
  function setMsg(id, text, type = '') {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg' + (type ? ' ' + type : '');
  }

  let toastT;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastT);
    toastT = setTimeout(() => el.classList.remove('show'), 2500);
  }

  // ── Init ──────────────────────────────────────────────────────
  connectMqtt();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
